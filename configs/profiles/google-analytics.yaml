# AEGIS-SILENTIUM Malleable C2 Profile — Google Analytics GA4 Mimicry
# Copy of relay/profiles/google-analytics.yaml for operator convenience
# Place this file at the path specified in [profile] profile_file in silentium.conf
# ──────────────────────────────────────────────────────────────────────────────
name: google-analytics-ga4
version: "1.0"

default_headers:
  User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
  Accept: "*/*"
  Accept-Language: "en-US,en;q=0.9"
  Accept-Encoding: "gzip, deflate, br"
  Origin: "https://www.google.com"
  Referer: "https://www.google.com/"
  Connection: "keep-alive"

uris:
  - /g/collect
  - /gtag/js
  - /analytics/collect
  - /health

client:
  container: json
  key: "session_data"
  transforms:
    - op: gzip
    - op: base64url

server:
  container: json
  key: "r"
  transforms:
    - op: gzip
    - op: base64url
