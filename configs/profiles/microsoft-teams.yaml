# AEGIS-SILENTIUM Malleable C2 Profile — Microsoft Teams Webhook Mimicry
# ──────────────────────────────────────────────────────────────────────────────
name: microsoft-teams-webhook
version: "1.0"

default_headers:
  User-Agent: "Microsoft Teams (1.6.00.4472) Desktop/Windows"
  Content-Type: "application/json; charset=utf-8"
  Accept: "application/json"
  Accept-Encoding: "gzip, deflate, br"

uris:
  - /webhook/v1.0/action
  - /webhook/v1.0/auth
  - /webhook/v1.0/mesh
  - /health

client:
  container: json
  key: "body"
  transforms:
    - op: gzip
    - op: base64

server:
  container: json
  key: "response"
  transforms:
    - op: gzip
    - op: base64
