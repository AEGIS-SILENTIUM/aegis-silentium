# AEGIS-SILENTIUM Relay 3 Configuration
# Profile: microsoft-teams-webhook
# ─────────────────────────────────────

listen:
  addr: "0.0.0.0:443"
  cert_file: /certs/relays/relay3_cert.pem
  key_file:  /certs/relays/relay3_key.pem
  ca_file:   /certs/ca/ca_cert.pem

core:
  url:         https://10.99.0.1:5000
  ca_cert:     /certs/ca/ca_cert.pem
  client_cert: /certs/clients/relay3_client_cert.pem
  client_key:  /certs/clients/relay3_client_key.pem
  timeout:     30s

crypto:
  signing_key_file: /certs/relays/relay_signing_key.pem
  revocation_file:  /config/revoked_nodes.json
  max_session_age:  300

profile:
  file:         /profiles/microsoft-teams.yaml
  fallback_raw: false

security:
  rate_limit:     100
  max_body_bytes: 1048576
  kill_switch_file: /tmp/aegis_kill

logging:
  level: info
  file:  /var/log/aegis/relay3.log
  json:  true

mesh:
  peer_relays:
    - https://10.99.0.2:443
    - https://10.99.0.3:443
  shared_key: CHANGE_THIS_MESH_SHARED_KEY
