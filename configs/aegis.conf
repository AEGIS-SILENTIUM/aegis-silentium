# ════════════════════════════════════════════════════════════════════════
# AEGIS-Advanced v4.0 APEX — Master Configuration File
# ════════════════════════════════════════════════════════════════════════
#
# All values here can be overridden by environment variables.
# Environment variable naming: SECTION_KEY (uppercase, underscore-joined)
# Example: [c2] operator_key → env C2_OPERATOR_KEY
#
# !! CHANGE ALL SECRETS BEFORE ANY REAL ENGAGEMENT !!
# Generate: openssl rand -hex 32
# ════════════════════════════════════════════════════════════════════════

# ── C2 Server ─────────────────────────────────────────────────────────────
[c2]
# Bind address and port for REST API + beacon endpoint
host                = 0.0.0.0
port                = 5000

# Alt HTTP beacon port (fallback for nodes behind firewalls)
alt_port            = 8080

# UDP mesh port for peer-to-peer node communication
mesh_port           = 5001

# !! CHANGE THIS — used to derive all encryption keys !!
c2_secret           = change-this-strong-secret-2026

# !! CHANGE THIS — operator API authentication key !!
operator_key        = ${OPERATOR_KEY}  # REQUIRED: set OPERATOR_KEY env var (min 32 chars)

# Long-poll duration for beacon endpoint (seconds)
# Higher = fewer requests but slower command delivery
beacon_lpoll        = 25

# API rate limit (requests per minute per IP)
max_rate            = 120

# Maximum events to store in memory for SSE replay
max_sse_buffer      = 500

# Enable TLS on C2 (requires ssl_cert + ssl_key)
tls_enabled         = false
ssl_cert            = /certs/c2.crt
ssl_key             = /certs/c2.key

# Domain fronting: accept requests on these Host headers
# front_domains     = cdn.example.com, static.cloudflare.com

# ── Node Agent ────────────────────────────────────────────────────────────
[node]
# C2 URL (nodes will connect here)
c2_url              = http://c2:5000

# Reports output directory
reports_dir         = /reports

# Heartbeat interval (seconds)
hb_interval         = 30

# Task poll interval when idle (seconds)
task_interval       = 5

# Max concurrent scans per node
max_parallel        = 2

# Default scan configuration
scan_threads        = 50
scan_depth          = 3
scan_timeout        = 10

# Auto-install persistence when critical vulns found (use with care)
auto_persist        = false

# Jitter range for beacon (seconds) — randomises check-in timing
beacon_jitter       = 15

# Max consecutive C2 failures before sleeping 1h
max_failures        = 10

# Retry registration this many times before giving up
max_register_retries = 20

# ── Scan Engine ───────────────────────────────────────────────────────────
[scan]
# Global defaults (can be overridden per-task)
default_timeout     = 10
default_threads     = 50
default_depth       = 3

# Enable ML risk scoring
ml_enabled          = true

# Enable adaptive WAF evasion
use_evasion         = true
evasion_level       = 3        # 1=light  2=moderate  3=aggressive

# Stealth mode: adds random delays between requests
stealth             = false
stealth_delay_min   = 0.5
stealth_delay_max   = 2.0

# Enable all scan phases by default
scan_ports          = true
scan_subdomains     = true
scan_vulns          = true
scan_ssl            = true
scan_osint          = false    # Requires API keys
scan_dirs           = true
scan_advanced       = true     # All 23 attack modules

# Port scan settings
port_scan_top       = 1000     # Top N ports to scan
port_scan_timeout   = 2.0

# Directory brute-force wordlist (relative to node dir)
wordlist            = wordlists/common.txt

# Subdomain wordlist
subdomain_wordlist  = wordlists/subdomains.txt

# Max URLs to crawl per target
max_crawl_urls      = 5000

# Max scan duration per target (seconds, 0 = unlimited)
max_duration        = 3600

# Proxy for scan requests (optional)
# proxy             = http://127.0.0.1:8080
# tor               = false

# ── Database ──────────────────────────────────────────────────────────────
[database]
host                = postgres
port                = 5432
name                = aegis
user                = aegis
password            = ${POSTGRES_PASSWORD}  # REQUIRED: set POSTGRES_PASSWORD env var

# Connection pool settings
pool_min            = 2
pool_max            = 20
pool_timeout        = 30
pool_recycle        = 3600

# ── Redis ─────────────────────────────────────────────────────────────────
[redis]
host                = redis
port                = 6379
db                  = 0
password            =
# socket_timeout    = 5
# max_connections   = 50

# ── Scheduler ─────────────────────────────────────────────────────────────
[scheduler]
# How often to re-scan completed targets (hours)
rescan_interval_hours       = 24

# Mark task as stale and reclaim after N minutes
stale_task_timeout_min      = 30

# Mark node as dead after N minutes of silence
dead_node_minutes           = 10

# Scheduler main loop interval (seconds)
cycle_seconds               = 60

# Maximum tasks in pending queue at once
max_pending_tasks           = 5000

# Rate limit: max new tasks launched per hour
max_tasks_per_hour          = 500

# Purge events older than N days
event_retention_days        = 30

# Purge full result JSON older than N days (summary kept)
result_retention_days       = 90

# ── Dashboard ─────────────────────────────────────────────────────────────
[dashboard]
host                = 0.0.0.0
port                = 7331

# Stats refresh interval (milliseconds, in the UI)
stats_interval_ms   = 3000

# ── OSINT API Keys ────────────────────────────────────────────────────────
[osint]
# Leave blank to disable that data source
shodan_key          =
virustotal_key      =
censys_id           =
censys_secret       =
greynoise_key       =
hunter_key          =
securitytrails_key  =
binaryedge_key      =
passivetotal_user   =
passivetotal_key    =

# ── Exfiltration ──────────────────────────────────────────────────────────
[exfil]
# Default method: auto | https | dns | icmp
default_method      = auto

# DNS tunnel authoritative domain (you control this)
dns_domain          =
dns_nameserver      =

# HTTPS: chunk size for chunked transfer mode (bytes)
https_chunk_size    = 4096

# ICMP: delay between packets (seconds)
icmp_delay          = 0.3

# Email exfil (optional)
smtp_host           =
smtp_port           = 587
smtp_user           =
smtp_pass           =
smtp_from           =
smtp_to             =

# ── Logging ───────────────────────────────────────────────────────────────
[logging]
level               = INFO       # DEBUG | INFO | WARNING | ERROR
file                = /logs/aegis.log
max_bytes           = 52428800   # 50MB
backup_count        = 5
format              = %(asctime)s [%(levelname)s] %(name)s: %(message)s

# ── Security ──────────────────────────────────────────────────────────────
[security]
# Timestamp tolerance for sealed messages (seconds)
timestamp_tolerance = 300

# PBKDF2 iterations for key derivation
pbkdf2_iterations   = 200000

# Session token TTL (seconds)
session_ttl         = 86400

# IP allowlist for operator API (comma-separated CIDRs, empty = allow all)
operator_allowlist  =

# Require HTTPS for operator API
require_https       = false

# ── Performance ───────────────────────────────────────────────────────────
[performance]
# Maximum memory per node process (MB, 0 = unlimited)
max_memory_mb       = 2048

# Garbage collect scan results after N hours
gc_results_hours    = 24

# Thread pool size for blocking operations
thread_pool_size    = 20
