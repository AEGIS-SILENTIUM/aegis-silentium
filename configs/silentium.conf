# ═══════════════════════════════════════════════════════════════════════════════
# AEGIS-SILENTIUM v1.0 — Master Configuration
# ═══════════════════════════════════════════════════════════════════════════════
# AUTHORIZED USE ONLY — Professional adversary simulation and proactive
# defense exercises in controlled, authorized environments only.
#
# All dangerous features are DISABLED by default and require explicit opt-in.
# ═══════════════════════════════════════════════════════════════════════════════

[silentium]
# Framework identification
framework_id        = aegis-silentium
version             = 5.0
operator_key        = CHANGE_THIS_TO_A_STRONG_RANDOM_KEY_32_CHARS_MIN

# ── C2 Architecture ──────────────────────────────────────────────────────────
[c2]
# Intelligence Core URL (accessible from relays via WireGuard/mTLS only)
core_url            = https://core.internal:5000

# Relay URLs (public-facing TLS endpoints)
relay_urls          = https://relay1.example.com:443,https://relay2.example.com:443

# Dashboard URL (read-only, behind client-cert auth)
dashboard_url       = https://dashboard.internal:7331

# Ports
api_port            = 5000     # C2 core REST API (not public)
relay_port          = 443      # Relay TLS listener
dashboard_port      = 7331     # Dashboard (internal only)
mesh_port           = 5001     # Relay-to-relay mesh (UDP, internal)

# ── Cryptography ─────────────────────────────────────────────────────────────
[crypto]
# AES-256-GCM session encryption
aes_key_size        = 32       # bytes (256-bit)
aes_nonce_size      = 12       # bytes (96-bit GCM nonce)

# PBKDF2 key derivation for long-term keys
pbkdf2_iterations   = 200000
pbkdf2_salt         = CHANGE_THIS_SALT_VALUE_BEFORE_DEPLOYMENT

# ECDHE Perfect Forward Secrecy
ecdhe_curve         = P-256
ecdhe_session_ttl   = 300      # seconds before relay discards ephemeral session
ecdhe_nonce_size    = 32       # bytes

# Relay signing key (ECDSA P-256)
relay_signing_key   = /etc/aegis/relay_signing.pem
relay_pubkey        = /etc/aegis/relay_signing_pub.der

# Certificate paths
tls_cert            = /etc/aegis/tls/cert.pem
tls_key             = /etc/aegis/tls/key.pem
tls_ca              = /etc/aegis/tls/ca.pem
client_cert         = /etc/aegis/tls/client.pem
client_key          = /etc/aegis/tls/client_key.pem

# ── Malleable C2 Profile ─────────────────────────────────────────────────────
[profile]
# Path to YAML Malleable C2 profile (relay and implant must use the same profile)
profile_file        = /etc/aegis/profiles/default.yaml

# Available profiles:
#   default.yaml          — Generic REST API mimicry
#   google-analytics.yaml — GA4 measurement protocol mimicry
#   microsoft-teams.yaml  — Teams webhook mimicry
# Add custom profiles in /etc/aegis/profiles/

# ── Implant Beacon Settings ───────────────────────────────────────────────────
[beacon]
# Beacon interval in seconds (randomized by jitter)
interval            = 60
jitter              = 0.3      # ±30% of interval

# Fallback relay selection strategy: round-robin | random | priority
relay_selection     = round-robin

# Maximum failed beacons before entering deep sleep
max_failures        = 5
sleep_on_failure    = 600      # 10 minutes deep sleep after max_failures

# Kill switch: signed "die" command causes immediate self-destruct
# The implant will verify the operator's signature before executing
kill_switch_enabled = true

# ── Environment Trust Assessment (Honeypot Evasion) ──────────────────────────
[evasion]
# Enable passive environment trust scoring
enabled             = true

# Minimum trust score to operate in full mode (0–100)
# Below this threshold, implant enters DORMANT mode
trust_threshold     = 40

# How often to re-assess the environment (seconds)
reassess_interval   = 300

# Dormant mode: if true, feed relay fake benign telemetry
decoy_telemetry     = true

# ── DNS-over-HTTPS Exfiltration ───────────────────────────────────────────────
[exfil_doh]
# Operator-controlled apex domain for DoH exfiltration
# Subdomain queries encode exfiltrated data (base32 chunks)
doh_domain          = CHANGE_TO_OPERATOR_DOMAIN

# DoH provider: cloudflare | google | quad9 | <custom URL>
doh_provider        = cloudflare

# Rate limiting: max DNS queries per second
# Keep low (1–3) to avoid triggering SIEM DNS anomaly alerts
doh_rate_limit      = 1.5
doh_jitter          = 0.4

# A-record encoding (ultra-covert, 4 bytes per query)
# Used for key material and short status codes only
a_record_domain     = CHANGE_TO_OPERATOR_DOMAIN
a_record_rate_limit = 0.5

# ── Standard Exfil Channels ──────────────────────────────────────────────────
[exfil]
# Channel priority order (first working channel is used)
channel_priority    = doh,https,dns,icmp,smtp,deadrop

# DNS tunnel (raw UDP)
dns_server          = CHANGE_TO_C2_DNS_SERVER
dns_domain          = CHANGE_TO_TUNNEL_DOMAIN
dns_chunk_size      = 45
dns_query_interval  = 2.0

# HTTPS exfil endpoint
https_url           = CHANGE_TO_C2_URL
https_timeout       = 30

# SMTP exfil
smtp_host           = CHANGE_TO_SMTP_HOST
smtp_port           = 587
smtp_user           = CHANGE_TO_SMTP_USER
smtp_pass           = CHANGE_TO_SMTP_PASS
smtp_to             = CHANGE_TO_OPERATOR_EMAIL

# ── Persistence (DISABLED by default) ────────────────────────────────────────
[persistence]
# DANGER: All persistence mechanisms are disabled by default.
# Set enabled=true to allow persistence (requires explicit opt-in).
enabled             = false

# Persistence methods to attempt (comma-separated):
# linux:  cron | systemd | ssh_key | bashrc | rc_local | ld_preload | suid
# windows: scheduled_task | registry | wmi | service | bits | lnk | ifeo
methods             = cron,ssh_key

# ── Privilege Escalation (DISABLED by default) ───────────────────────────────
[privesc]
enabled             = false
# Auto-escalate if opportunity found
auto_escalate       = false

# ── Lateral Movement (DISABLED by default) ────────────────────────────────────
[lateral]
enabled             = false
# Key harvest: collect SSH keys from compromised host
key_harvest         = false
# Credential spray: attempt SSH access to discovered hosts
spray               = false
# Maximum hops from initial foothold
max_hops            = 2

# ── OPSEC / Log Clearing (DISABLED by default) ────────────────────────────────
[opsec]
enabled             = false
# Clear shell history on beacon
clear_history       = false
# Timestomp modified files
timestomp           = false
# Masquerade process name
process_masquerade  = false

# ── Logging ───────────────────────────────────────────────────────────────────
[logging]
# Implant logging: minimal (none | errors_only | info | debug)
# Keep at errors_only or none in production to minimize artifacts
implant_log_level   = errors_only

# Relay logging: comprehensive (all requests, session events, errors)
relay_log_level     = info
relay_log_file      = /var/log/aegis/relay.log

# Core logging
core_log_level      = info
core_log_file       = /var/log/aegis/core.log

# Rotate logs daily, keep 30 days
log_rotation        = daily
log_retention_days  = 30

# ── Database (Intelligence Core) ─────────────────────────────────────────────
[database]
host                = localhost
port                = 5432
name                = aegis_silentium
user                = aegis
password            = CHANGE_THIS_DATABASE_PASSWORD

# Column-level encryption key (AES-256)
# Sensitive columns (vuln details, credentials) are encrypted at rest
column_enc_key      = CHANGE_THIS_32_BYTE_COLUMN_ENCRYPTION_KEY

# ── WireGuard (Relay ↔ Core channel) ─────────────────────────────────────────
[wireguard]
# WireGuard interface name on relay/core
interface           = wg0
# Core's WireGuard endpoint (relays connect to this)
core_endpoint       = 10.99.0.1:51820
# Relay's WireGuard IP (each relay gets a unique /32 in 10.99.0.0/24)
relay_ip            = 10.99.0.2/24
core_ip             = 10.99.0.1/24
# Key files (generated by scripts/setup_wireguard.sh)
private_key_file    = /etc/wireguard/private.key
public_key_file     = /etc/wireguard/public.key

# ── Emergency Control ────────────────────────────────────────────────────────
[emergency]
# Operator signs a "die" message with their private key to kill all implants
# Operator public key (ECDSA P-256, DER base64)
operator_pubkey     = CHANGE_TO_OPERATOR_PUBLIC_KEY

# Kill-switch file: touch this file to immediately stop the relay
relay_kill_switch   = /tmp/aegis_kill

# Emergency stop: signed "stop_all" kills all active sessions
emergency_stop_uri  = /api/emergency/stop

# ── Scanning (AEGIS v4 Core) ─────────────────────────────────────────────────
[scan]
# Maximum parallel scans per node
max_parallel        = 3

# Scan phases enabled by default (comma-separated)
# Phases: crawl,dns,ssl,ports,subdomains,vulns,dirs,osint,ml,plugins,attacks
enabled_phases      = crawl,dns,ssl,ports,subdomains,vulns

# Attack validation (DISABLED by default — requires explicit opt-in)
attacks_enabled     = false

# Directory brute-force wordlist
dir_wordlist        = /opt/aegis/wordlists/common.txt

# Port scan ranges
port_ranges         = 21,22,23,25,53,80,110,143,443,445,3306,3389,5432,6379,8080,8443,27017

# ── Auto-persist on critical finds (DISABLED) ────────────────────────────────
[automation]
# If a Critical vulnerability is found AND persistence is enabled,
# automatically attempt to establish persistence
auto_persist        = false
auto_persist_severity = CRITICAL

# Auto-escalate if running as non-root and privesc is enabled
auto_privesc        = false
