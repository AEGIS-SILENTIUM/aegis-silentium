# AEGIS-SILENTIUM Relay 1 Configuration
# Profile: default-rest-api (generic JSON)
# ─────────────────────────────────────

listen:
  addr: "0.0.0.0:443"
  cert_file: /certs/relays/relay1_cert.pem
  key_file:  /certs/relays/relay1_key.pem
  ca_file:   /certs/ca/ca_cert.pem

core:
  url:         https://10.99.0.1:5000
  ca_cert:     /certs/ca/ca_cert.pem
  client_cert: /certs/clients/relay1_client_cert.pem
  client_key:  /certs/clients/relay1_client_key.pem
  timeout:     30s

crypto:
  signing_key_file: /certs/relays/relay_signing_key.pem
  revocation_file:  /config/revoked_nodes.json
  max_session_age:  300   # seconds

profile:
  file:         /profiles/default.yaml
  fallback_raw: false

security:
  rate_limit:     100     # requests/sec per IP
  max_body_bytes: 1048576 # 1 MB
  kill_switch_file: /tmp/aegis_kill

logging:
  level: info
  file:  /var/log/aegis/relay1.log
  json:  true

mesh:
  peer_relays:
    - https://10.99.0.3:443   # relay2 (internal)
    - https://10.99.0.4:443   # relay3 (internal)
  shared_key: CHANGE_THIS_MESH_SHARED_KEY
