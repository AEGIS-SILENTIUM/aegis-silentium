# AEGIS-SILENTIUM v12 - Docker Compose
# REQUIRED environment variables (no insecure defaults):
#   POSTGRES_PASSWORD - strong random password (openssl rand -hex 24)
#   OPERATOR_KEY      - 48+ char operator key  (openssl rand -hex 32)
#   C2_SECRET         - 32+ char shared secret  (openssl rand -hex 24)
#   C2_JWT_SECRET     - JWT signing key          (openssl rand -hex 32)
# Copy .env.example to .env and fill in all values before running.
#
version: "3.9"

# ════════════════════════════════════════════════════════════════════════
# AEGIS-Advanced v4.0 APEX — Full Stack Docker Compose
# ════════════════════════════════════════════════════════════════════════
#
# Services:
#   postgres    — Persistent storage (tasks, vulns, campaigns, events)
#   redis       — Event bus, task queue, pub/sub
#   c2          — Command & Control server  :5000  (+ UDP mesh :5001)
#   dashboard   — Operator console          :7331
#   scheduler   — Campaign lifecycle + auto-rescan
#   node-1/2/3  — Scan worker nodes (scale as needed)
#
# Quick start:
#   bash scripts/run.sh
#   bash scripts/add_target.sh https://target.com
#   open http://localhost:7331
#
# Production — set strong secrets:
#   export C2_SECRET=$(openssl rand -hex 32)
#   export OPERATOR_KEY=$(openssl rand -hex 16)
#   export POSTGRES_PASSWORD=$(openssl rand -hex 16)
# ════════════════════════════════════════════════════════════════════════

x-common-env: &common-env
  C2_SECRET:         ${C2_SECRET:?C2_SECRET must be set - run: export C2_SECRET=$(openssl rand -hex 32)}
  OPERATOR_KEY:      ${OPERATOR_KEY:?OPERATOR_KEY must be set - run: export OPERATOR_KEY=$(openssl rand -hex 24)}
  REDIS_HOST:        redis
  REDIS_PASSWORD:    ${REDIS_PASSWORD:-}
  POSTGRES_HOST:     postgres
  POSTGRES_DB:       aegis
  POSTGRES_USER:     aegis
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}

x-node-env: &node-env
  <<: *common-env
  C2_URL:         http://c2:5000
  REPORTS_DIR:    /reports
  HB_INTERVAL:    "30"
  TASK_INTERVAL:  "5"
  MAX_PARALLEL:   "2"
  SCAN_THREADS:   "40"
  SCAN_DEPTH:     "3"
  AUTO_PERSIST:   "false"

x-healthcheck-http: &hc-http
  test: ["CMD", "curl", "-sf", "http://localhost:${PORT:-5000}/api/stats"]
  interval: 20s
  timeout: 5s
  retries: 5
  start_period: 30s

x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: "json-file"
    options:
      max-size: "20m"
      max-file: "5"

# ── Networks ─────────────────────────────────────────────────────────────
networks:
  aegis-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ── Volumes ──────────────────────────────────────────────────────────────
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  reports-data:
    driver: local
  aegis-logs:
    driver: local

# ════════════════════════════════════════════════════════════════════════
# SERVICES
# ════════════════════════════════════════════════════════════════════════
services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aegis-postgres
    <<: [*restart, *logging]
    environment:
      POSTGRES_DB:       aegis
      POSTGRES_USER:     aegis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - aegis-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis -d aegis"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c log_min_duration_statement=1000
        -c log_connections=off

  # ── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aegis-redis
    <<: [*restart, *logging]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    networks:
      - aegis-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    command: >
      redis-server
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --save 900 1
        --save 300 10
        --save 60 10000
        --loglevel warning
        ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}

  # ── C2 Server ───────────────────────────────────────────────────────────
  c2:
    build:
      context: .
      dockerfile: c2/Dockerfile
    container_name: aegis-c2
    <<: [*restart, *logging]
    environment:
      <<: *common-env
      BEACON_LPOLL:  "25"
      MAX_RATE:      "120"
      MESH_PORT:     "5001"
    ports:
      - "5000:5000"       # REST API + beacon
      - "5001:5001/udp"   # Mesh UDP
      - "8080:8080"       # Alt HTTP beacon
    networks:
      - aegis-internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/api/stats"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - aegis-logs:/logs

  # ── Dashboard ───────────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: aegis-dashboard
    <<: [*restart, *logging]
    environment:
      <<: *common-env
      C2_URL: http://c2:5000
      PORT:   "7331"
    ports:
      - "7331:7331"
    networks:
      - aegis-internal
    depends_on:
      c2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7331/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Scheduler ───────────────────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: scheduler/Dockerfile
    container_name: aegis-scheduler
    <<: [*restart, *logging]
    environment:
      <<: *common-env
      RESCAN_INTERVAL_HOURS:   "24"
      STALE_TASK_TIMEOUT_MIN:  "30"
      DEAD_NODE_MINUTES:       "10"
      SCHEDULER_CYCLE_SECONDS: "60"
      MAX_PENDING_TASKS:       "5000"
      MAX_TASKS_PER_HOUR:      "500"
    networks:
      - aegis-internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Worker Nodes ────────────────────────────────────────────────────────
  node-1:
    build:
      context: .
      dockerfile: node/Dockerfile
    container_name: aegis-node-1
    <<: [*restart, *logging]
    environment:
      <<: *node-env
      NODE_ID: node-1-${HOSTNAME:-docker}
    networks:
      - aegis-internal
    depends_on:
      c2:
        condition: service_healthy
    volumes:
      - reports-data:/reports
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
        reservations:
          memory: 256M

  node-2:
    build:
      context: .
      dockerfile: node/Dockerfile
    container_name: aegis-node-2
    <<: [*restart, *logging]
    environment:
      <<: *node-env
      NODE_ID: node-2-${HOSTNAME:-docker}
    networks:
      - aegis-internal
    depends_on:
      c2:
        condition: service_healthy
    volumes:
      - reports-data:/reports
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
        reservations:
          memory: 256M

  node-3:
    build:
      context: .
      dockerfile: node/Dockerfile
    container_name: aegis-node-3
    <<: [*restart, *logging]
    environment:
      <<: *node-env
      NODE_ID: node-3-${HOSTNAME:-docker}
    networks:
      - aegis-internal
    depends_on:
      c2:
        condition: service_healthy
    volumes:
      - reports-data:/reports
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
        reservations:
          memory: 256M

# ════════════════════════════════════════════════════════════════════════
# PROFILES (optional extended services)
# ════════════════════════════════════════════════════════════════════════

  # Add extra nodes with: docker compose --profile extra up -d
  node-4:
    profiles: ["extra", "scale"]
    build:
      context: .
      dockerfile: node/Dockerfile
    container_name: aegis-node-4
    <<: [*restart, *logging]
    environment:
      <<: *node-env
      NODE_ID: node-4-${HOSTNAME:-docker}
    networks:
      - aegis-internal
    depends_on:
      c2:
        condition: service_healthy
    volumes:
      - reports-data:/reports

  node-5:
    profiles: ["extra", "scale"]
    build:
      context: .
      dockerfile: node/Dockerfile
    container_name: aegis-node-5
    <<: [*restart, *logging]
    environment:
      <<: *node-env
      NODE_ID: node-5-${HOSTNAME:-docker}
    networks:
      - aegis-internal
    depends_on:
      c2:
        condition: service_healthy
    volumes:
      - reports-data:/reports

  # pgAdmin for DB inspection (profile: admin)
  pgadmin:
    profiles: ["admin"]
    image: dpage/pgadmin4:latest
    container_name: aegis-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@aegis.local
      PGADMIN_DEFAULT_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    networks:
      - aegis-internal
    depends_on:
      - postgres
    restart: unless-stopped

  # Redis Commander (profile: admin)
  redis-commander:
    profiles: ["admin"]
    image: rediscommander/redis-commander:latest
    container_name: aegis-redis-ui
    environment:
      REDIS_HOSTS: "local:redis:6379"
    ports:
      - "8081:8081"
    networks:
      - aegis-internal
    depends_on:
      - redis
    restart: unless-stopped
