global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    system: aegis-silentium

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: aegis-c2-1
    static_configs:
      - targets: ["c2-1:5000"]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: aegis-c2-2
    static_configs:
      - targets: ["c2-2:5000"]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis-exporter
    static_configs:
      - targets: ["redis-exporter:9121"]
