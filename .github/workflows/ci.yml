name: AEGIS-SILENTIUM CI

on:
  push:
    branches: [main, develop, "release/*"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  POSTGRES_IMAGE: "postgres:16-alpine"
  REDIS_IMAGE:    "redis:7-alpine"

# ════════════════════════════════════════════════════════════════════════
# JOBS
# ════════════════════════════════════════════════════════════════════════
jobs:

  # ── 1. Lint & Static Analysis ─────────────────────────────────────────
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint deps
        run: |
          pip install ruff mypy bandit types-redis types-psycopg2

      - name: ruff (style + imports)
        run: ruff check aegis/c2/ aegis/scheduler/ --output-format=github

      - name: bandit (security linting)
        run: |
          bandit -r aegis/c2/ aegis/scheduler/ \
            -ll -x aegis/c2/__pycache__ \
            --format sarif \
            -o bandit-results.sarif || true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-results.sarif
        continue-on-error: true

      - name: mypy (type checking)
        run: |
          mypy aegis/c2/auth/ aegis/c2/resilience/ aegis/c2/observability/ \
            --ignore-missing-imports --no-error-summary || true

  # ── 2. Unit Tests ─────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test deps
        run: pip install pytest pytest-mock pytest-cov

      - name: Run unit tests
        run: |
          cd aegis
          python -m pytest tests/unit/ \
            --tb=short \
            --cov=c2 \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --junit-xml=unit-results.xml \
            -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: aegis/coverage.xml
          flags: unit
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: aegis/unit-results.xml

  # ── 3. Integration Tests ──────────────────────────────────────────────
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: ${{ env.POSTGRES_IMAGE }}
        env:
          POSTGRES_DB:       aegis_test
          POSTGRES_USER:     aegis_test
          POSTGRES_PASSWORD: test_secret
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U aegis_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: ${{ env.REDIS_IMAGE }}
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 2s
          --health-retries 10

    env:
      POSTGRES_HOST:     localhost
      POSTGRES_DB:       aegis_test
      POSTGRES_USER:     aegis_test
      POSTGRES_PASSWORD: test_secret
      REDIS_HOST:        localhost
      OPERATOR_KEY:      test-operator-key
      C2_JWT_SECRET:     test-jwt-secret-32bytes-00000000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: |
          pip install -r aegis/requirements.txt
          pip install pytest pytest-mock pytest-cov

      - name: Apply schema
        run: |
          cd aegis
          PGPASSWORD=test_secret psql -h localhost -U aegis_test -d aegis_test \
            -f deployment/init.sql
          PGPASSWORD=test_secret psql -h localhost -U aegis_test -d aegis_test \
            -f deployment/migrations/v9_schema.sql

      - name: Run integration tests
        run: |
          cd aegis
          python -m pytest tests/integration/ \
            --tb=short \
            --junit-xml=int-results.xml \
            -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: aegis/int-results.xml

  # ── 4. Dependency vulnerability scan ──────────────────────────────────
  dependency-scan:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r aegis/requirements.txt \
            --format json \
            -o pip-audit-results.json || true
          cat pip-audit-results.json | python3 -c "
          import json,sys
          data = json.load(sys.stdin)
          vulns = [v for p in data.get('dependencies',[]) for v in p.get('vulns',[])]
          if vulns:
              for v in vulns:
                  print(f\"VULN: {v.get('id')} — {v.get('description','')[:80]}\")
              sys.exit(1)
          print('No known vulnerabilities found.')
          " || echo "::warning::Vulnerabilities found - review pip-audit-results.json"

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: dependency-scan
          path: pip-audit-results.json

  # ── 5. Container build & scan ─────────────────────────────────────────
  build:
    name: Build & scan images
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build C2 image
        uses: docker/build-push-action@v5
        with:
          context: aegis
          file:    aegis/c2/Dockerfile
          push:    false
          tags:    aegis-c2:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          outputs: type=docker,dest=/tmp/c2-image.tar

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          input:          /tmp/c2-image.tar
          format:         sarif
          output:         trivy-results.sarif
          severity:       CRITICAL,HIGH
          exit-code:      "0"    # Don't fail on findings — report only
        continue-on-error: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: Generate SBOM (Syft)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin 2>/dev/null || true
          if command -v syft &>/dev/null; then
            syft packages aegis/ \
              --output spdx-json=sbom.spdx.json \
              --output cyclonedx-json=sbom.cyclonedx.json || true
          fi

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom.spdx.json
            sbom.cyclonedx.json
        if: always()

  # ── 6. Load test (on main only) ───────────────────────────────────────
  load-test:
    name: Load test
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.ref == 'refs/heads/main'

    services:
      postgres:
        image: ${{ env.POSTGRES_IMAGE }}
        env:
          POSTGRES_DB: aegis_lt
          POSTGRES_USER: aegis_lt
          POSTGRES_PASSWORD: lt_secret
        ports: ["5432:5432"]
        options: --health-cmd "pg_isready -U aegis_lt" --health-interval 5s --health-retries 10

      redis:
        image: ${{ env.REDIS_IMAGE }}
        ports: ["6379:6379"]

    env:
      POSTGRES_HOST: localhost
      POSTGRES_DB:   aegis_lt
      POSTGRES_USER: aegis_lt
      POSTGRES_PASSWORD: lt_secret
      REDIS_HOST:    localhost
      OPERATOR_KEY:  lt-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: pip install -r aegis/requirements.txt locust

      - name: Apply schema
        run: |
          PGPASSWORD=lt_secret psql -h localhost -U aegis_lt -d aegis_lt \
            -f aegis/deployment/init.sql
          PGPASSWORD=lt_secret psql -h localhost -U aegis_lt -d aegis_lt \
            -f aegis/deployment/migrations/v9_schema.sql

      - name: Start C2 server
        run: |
          cd aegis/c2
          python app.py &
          sleep 5
          curl -sf http://localhost:5000/health || exit 1

      - name: Run load test (2 min, 20 users)
        run: |
          cd aegis
          locust -f tests/load/locustfile.py \
            --headless \
            --users 20 \
            --spawn-rate 5 \
            --run-time 2m \
            --host http://localhost:5000 \
            --only-summary \
            --csv tests/load/results || true

      - name: Upload load test results
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: aegis/tests/load/results*
        if: always()

  # ── 7. Release: sign + push (on tags) ────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build, integration-tests, dependency-scan]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write
      id-token: write  # For OIDC signing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag
        id: meta
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build & push C2 image
        uses: docker/build-push-action@v5
        with:
          context:  aegis
          file:     aegis/c2/Dockerfile
          push:     true
          tags: |
            ghcr.io/${{ github.repository_owner }}/aegis-c2:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/aegis-c2:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            sbom.spdx.json
            sbom.cyclonedx.json
